<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情緒儀表 - 你的情緒座標</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="nav-links">
    <a href="../大冒險地圖/index.html" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); margin-right: 10px;">&larr; 回到大地圖</a>
    <a href="dashboard.html">後台統計 Dashboard &rarr;</a>
  </div>

  <div class="container">
    <!-- Setup Screen (Form) -->
    <div id="setup-screen" class="setup-screen">
      <div class="glass-panel">
        <h1 style="margin-bottom: 1rem; text-align: center;">探索你的情緒座標</h1>
        <p style="text-align: center; margin-bottom: 2rem; color: #cbd5e1;">請輸入你的名字與一句形容現在自己的話，讓我們為你打造專屬的情緒圖騰。</p>
        
        <form id="setup-form" class="setup-form">
          <div class="input-group">
            <label for="user-name">你的名字</label>
            <input type="text" id="user-name" placeholder="例如：小明" required maxlength="10">
          </div>
          
          <div class="input-group">
            <label for="user-desc">形容自己的一句話</label>
            <textarea id="user-desc" rows="3" placeholder="例如：今天充滿幹勁！" required maxlength="50"></textarea>
          </div>
          
          <div class="input-group">
            <label for="group-code">群組代碼 (選填)</label>
            <input type="text" id="group-code" placeholder="例如：Class1" maxlength="20">
          </div>
          
          <button type="submit" class="btn">生成專屬圖騰</button>
        </form>
      </div>
    </div>

    <!-- App Screen (Map Drag & Drop) -->
    <div id="app-screen" class="app-screen">
      <div class="header">
        <h1>將圖騰移動到你的情緒位置</h1>
        <p>橫軸代表「愉悅度」，縱軸代表「能量程度」</p>
      </div>

      <div class="map-container" id="map-container">
        <!-- 10x10 Grid injected via grid.js -->
        <div class="mood-grid"></div>
        
        <!-- Axes -->
        <div class="axis-x"></div>
        <div class="axis-y"></div>
        <div class="axis-label label-top">高能量</div>
        <div class="axis-label label-bottom">低能量</div>
        <div class="axis-label label-left">低愉悅</div>
        <div class="axis-label label-right">高愉悅</div>

        <!-- Draggable Avatar -->
        <div id="avatar" class="avatar-3d" style="display: none; left: 50%; top: 50%;">
          <span id="avatar-emoji" style="font-size: 40px; line-height: 1;"></span>
        </div>
      </div>

      <div class="controls">
        <button id="btn-back" class="btn" style="background: rgba(255,255,255,0.1); color: white;">重新設定</button>
        <button id="btn-submit" class="btn">確認送出</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
  <script src="grid.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
