<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情緒儀表 - 後台統計</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="nav-links">
    <a href="index.html">&larr; 返回參與活動</a>
  </div>

  <div class="container" style="display: flex; flex-direction: column; align-items: center; padding-top: 4rem;">
    <div class="header">
      <h1>情緒統計儀表板</h1>
      <p>點擊發光的區域以放大查看參與者的細節</p>
    </div>

    <div class="map-container" id="dashboard-map">
      <!-- 10x10 Grid injected via grid.js -->
      <div class="mood-grid"></div>
      
      <!-- Axes -->
      <div class="axis-x"></div>
      <div class="axis-y"></div>
      <div class="axis-label label-top">高能量</div>
      <div class="axis-label label-bottom">低能量</div>
      <div class="axis-label label-left">低愉悅</div>
      <div class="axis-label label-right">高愉悅</div>

      <!-- Bubbles will be injected here via JS -->
    </div>
    
    <div style="margin-top: 2rem;">
      <button id="btn-clear" class="btn" style="background: #ef4444;">清空所有資料</button>
    </div>
  </div>

  <!-- Modal for showing participants in a cluster -->
  <div id="details-modal" class="modal-overlay">
    <div class="modal-content glass-panel">
      <button class="close-btn" id="close-modal">&times;</button>
      <h2 id="modal-title" style="margin-bottom: 1rem; color: var(--accent);">此區域的參與者</h2>
      <div id="modal-list">
        <!-- Participant cards injected here -->
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
  <script src="grid.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
