<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>森林大冒險地圖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700;900&display=swap');

    :root {
      --primary: #4CAF50;
      --primary-dark: #388E3C;
      --bg-color: #F1F8E9;
      --text-dark: #333;
      --text-light: #fff;
      --locked: #9E9E9E;
      --wood: #8D6E63;
      --slot-bg: rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; font-family: 'Inter', 'PingFang TC', 'Noto Sans TC', sans-serif; }

    body {
      margin: 0; padding: 0; background-color: var(--bg-color);
      color: var(--text-dark); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      background-image: radial-gradient(circle at 50% 0%, #DCEDC8 0%, #F1F8E9 50%);
    }

    header {
      width: 100%; max-width: 800px; padding: 20px;
      display: flex; justify-content: space-between; align-items: center;
      position: relative;
    }

    .title-box { text-align: center; flex: 1; }
    h1 { color: var(--primary-dark); margin: 0 0 5px 0; font-size: 2.2rem; }
    p.subtitle { margin: 0; color: #555; font-size: 1.1rem; }

    .btn-reset {
      background: #FF5252; color: white; border: none; padding: 8px 15px;
      border-radius: 20px; cursor: pointer; font-weight: bold;
      box-shadow: 0 4px 6px rgba(255,82,82,0.3); transition: transform 0.2s;
    }
    .btn-reset:hover { transform: scale(1.05); }

    .map-container {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      width: 100%; max-width: 800px; padding: 20px; gap: 30px;
    }

    .levels-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px; width: 100%;
    }

    .level-card {
      background: white; border-radius: 20px; padding: 30px 20px;
      text-align: center; text-decoration: none; color: var(--text-dark);
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative; overflow: hidden;
      border: 2px solid transparent;
      display: flex; flex-direction: column; align-items: center; gap: 15px;
    }
    .level-card:hover { transform: translateY(-5px); box-shadow: 0 15px 25px rgba(0,0,0,0.1); }
    
    .level-card.completed { border-color: var(--primary); background: #f9fff9; }

    .level-icon { font-size: 4rem; margin: 0; line-height: 1; }
    .level-title { font-size: 1.5rem; font-weight: bold; margin: 0; }
    
    .level-status {
      display: inline-block; padding: 6px 15px; border-radius: 20px;
      font-size: 0.9rem; font-weight: bold;
      background: #eee; color: #777;
    }
    .level-card.completed .level-status { background: var(--primary); color: white; }

    .gate-container { text-align: center; margin-top: 20px; }
    .btn-gate {
      background: linear-gradient(135deg, var(--wood), #5D4037);
      color: white; border: none; padding: 15px 40px; font-size: 1.3rem;
      border-radius: 30px; cursor: pointer; font-weight: bold;
      box-shadow: 0 8px 15px rgba(141, 110, 99, 0.4);
      transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px;
    }
    .btn-gate:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(141, 110, 99, 0.5); }
    .gate-info { margin-top: 10px; font-weight: bold; color: var(--primary-dark); }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
      display: none; justify-content: center; align-items: center; z-index: 1000;
      opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.active { display: flex; opacity: 1; }

    .modal-content {
      background: white; border-radius: 24px; padding: 30px; width: 90%; max-width: 600px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center; position: relative;
    }
    .close-modal {
      position: absolute; top: 15px; right: 20px; font-size: 1.5rem;
      cursor: pointer; color: #888; border: none; background: transparent;
    }

    .slots-area {
      display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap;
    }
    .slot {
      width: 140px; height: 140px; border: 3px dashed #ccc; border-radius: 20px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: var(--slot-bg); transition: all 0.3s; position: relative;
    }
    .slot.drag-over { border-color: var(--primary); background: rgba(76, 175, 80, 0.1); transform: scale(1.05); }
    .slot.filled { border: 3px solid var(--primary); background: #f0fdf0; }
    .slot.error { border-color: #F44336; animation: shake 0.4s; }
    .slot-label { position: absolute; bottom: -25px; font-weight: bold; color: #666; font-size: 0.9rem; white-space: nowrap; }

    .backpack {
      background: #f5f5f5; border-radius: 16px; padding: 20px; min-height: 120px;
      display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;
      border: 2px solid #e0e0e0;
    }
    .backpack::before {
      content: '🎒 你的冒險背包'; position: absolute; top: -12px; left: 50%;
      transform: translateX(-50%); background: #e0e0e0; padding: 2px 10px;
      border-radius: 10px; font-size: 0.85rem; font-weight: bold; color: #555;
    }
    .backpack-wrapper { position: relative; margin-top: 30px; }

    .badge {
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #FFD54F, #FF8F00);
      color: white; font-size: 2rem; display: flex; justify-content: center; align-items: center;
      cursor: grab; box-shadow: 0 6px 12px rgba(255, 143, 0, 0.4), inset 0 2px 5px rgba(255,255,255,0.8);
      position: relative; z-index: 10; border: 3px solid #FFE082;
      user-select: none; touch-action: none;
    }
    .badge:active { cursor: grabbing; transform: scale(1.1); }
    .badge.cert_dynasty::after { content: '🎴'; }
    .badge.cert_idiom::after { content: '📝'; }
    
    .slot .badge { width: 100px; height: 100px; cursor: default; }
    .empty-msg { color: #999; font-style: italic; }

    /* Victory Screen */
    #victory-screen {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 2000; color: white; text-align: center;
      padding: 20px;
    }
    #victory-screen h1 { color: #FFD54F; font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,213,79,0.5); }
    .victory-stats { font-size: 1.5rem; margin: 20px 0 40px; color: #ddd; }
    .btn-restart {
      background: #FFD54F; color: #333; border: none; padding: 15px 40px;
      font-size: 1.2rem; border-radius: 30px; cursor: pointer; font-weight: bold;
      transition: transform 0.2s;
    }
    .btn-restart:hover { transform: scale(1.05); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
    }

    /* Fireworks */
    .firework {
      position: absolute; width: 5px; height: 5px; border-radius: 50%;
      animation: explode 1s ease-out forwards;
    }
    @keyframes explode {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

  </style>
</head>
<body>

  <!-- Intro Screen -->
  <div id="intro-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #000; display: flex; justify-content: center; align-items: center; transition: opacity 1s;">
    <div id="start-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: url('未命名設計 (3).png') center/cover, rgba(0,0,0,0.7); background-blend-mode: overlay; z-index: 10001;">
      <button id="btn-play-intro" style="padding: 20px 50px; font-size: 1.8rem; background: #4CAF50; color: white; border: 3px solid #FFF; border-radius: 40px; cursor: pointer; box-shadow: 0 0 30px rgba(76, 175, 80, 0.8); font-weight: bold; transition: transform 0.2s;">進入森林大冒險 🌲</button>
    </div>
    <video id="intro-video" src="forest.mp4" style="width: 100%; height: 100%; object-fit: cover; display: none;" playsinline></video>
    <button id="skip-intro" style="position: absolute; top: 30px; right: 30px; padding: 10px 20px; background: rgba(0,0,0,0.5); color: white; border: 2px solid white; border-radius: 20px; cursor: pointer; font-size: 1.1rem; z-index: 10000; backdrop-filter: blur(5px); display: none; transition: background 0.2s;">跳過動畫 ⏭</button>
  </div>

  <header>
    <div style="width: 100px; text-align: left;">
      <button class="btn-reset" style="background: #03A9F4; box-shadow: 0 4px 6px rgba(3,169,244,0.3);" onclick="replayIntro()">🎬 重播動畫</button>
    </div>
    <div class="title-box">
      <h1>大冒險地圖</h1>
      <p class="subtitle">完成 2個關卡，拿到通關證明</p>
    </div>
    <div style="width: 100px; text-align: right;">
      <button class="btn-reset" onclick="resetProgress()">🔄 清除進度</button>
    </div>
  </header>

  <div class="map-container">
    <div class="levels-grid">
      <!-- Level 1 -->
      <a href="../情緒座標/index.html" class="level-card" id="card-dynasty">
        <div class="level-icon">🎴</div>
        <div class="level-title">關卡 1：情緒座標</div>
        <div class="level-status" id="status-dynasty">未完成</div>
      </a>

      <!-- Level 2 -->
      <a href="../森之尋字遊戲/index.html" class="level-card" id="card-idiom">
        <div class="level-icon">📝</div>
        <div class="level-title">關卡 2：森之尋字</div>
        <div class="level-status" id="status-idiom">未完成</div>
      </a>
    </div>

    <div class="gate-container">
      <button class="btn-gate" onclick="openGate()">🔒 通關大門</button>
      <div class="gate-info" id="badge-count">目前持有：0 / 2</div>
    </div>
  </div>

  <!-- Gate Modal -->
  <div class="modal-overlay" id="gate-modal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeGate()">✖</button>
      <h2>通關大門</h2>
      <p>請將您收集到的憑證放入對應的凹槽中解鎖大門！</p>
      
      <div class="slots-area">
        <div class="slot" id="slot-dynasty" data-accept="cert_dynasty">
          <div class="slot-label">情緒座標</div>
        </div>
        <div class="slot" id="slot-idiom" data-accept="cert_idiom">
          <div class="slot-label">森之尋字</div>
        </div>
      </div>

      <div class="backpack-wrapper">
        <div class="backpack" id="backpack">
          <span class="empty-msg" id="empty-msg">背包裡空空的...趕快去闖關吧！</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Victory Screen -->
  <div id="victory-screen">
    <h1>🏆 冒險完成！</h1>
    <h2>請領取冒險者金幣2枚</h2>
    <div class="victory-stats" id="time-display">總冒險時長：00 分 00 秒</div>
    <button class="btn-restart" onclick="resetProgress()">再次冒險</button>
  </div>

  <script>
    // --- Intro Video Logic ---
    const introContainer = document.getElementById('intro-container');
    const startOverlay = document.getElementById('start-overlay');
    const introVideo = document.getElementById('intro-video');
    const skipIntroBtn = document.getElementById('skip-intro');
    const btnPlayIntro = document.getElementById('btn-play-intro');

    // If intro was already watched, hide the whole intro container immediately
    if (sessionStorage.getItem('intro_watched') === 'true') {
      introContainer.style.display = 'none';
    }

    btnPlayIntro.addEventListener('click', () => {
      startOverlay.style.display = 'none';
      introVideo.style.display = 'block';
      skipIntroBtn.style.display = 'block';
      introVideo.play().catch(e => {
        console.error("Video play failed:", e);
        finishIntro();
      });
    });

    introVideo.addEventListener('ended', finishIntro);
    skipIntroBtn.addEventListener('click', finishIntro);

    function finishIntro() {
      sessionStorage.setItem('intro_watched', 'true');
      introVideo.pause();
      introContainer.style.opacity = '0';
      setTimeout(() => {
        introContainer.style.display = 'none';
      }, 1000);
    }

    function replayIntro() {
      introContainer.style.display = 'flex';
      introContainer.style.opacity = '1';
      startOverlay.style.display = 'flex';
      introVideo.style.display = 'none';
      skipIntroBtn.style.display = 'none';
      introVideo.currentTime = 0;
    }

    // Initialize Adventure Start Time
    if (!localStorage.getItem('adventure_start')) {
      localStorage.setItem('adventure_start', Date.now());
    }

    let heldBadges = 0;
    const requiredBadges = 2;
    let slotsFilled = 0;

    function updateUI() {
      heldBadges = 0;
      
      // Check Dynasty
      if (localStorage.getItem('cert_dynasty')) {
        document.getElementById('card-dynasty').classList.add('completed');
        document.getElementById('status-dynasty').textContent = '已完成 ✓';
        heldBadges++;
      } else {
        document.getElementById('card-dynasty').classList.remove('completed');
        document.getElementById('status-dynasty').textContent = '未完成';
      }

      // Check Idiom
      if (localStorage.getItem('cert_idiom')) {
        document.getElementById('card-idiom').classList.add('completed');
        document.getElementById('status-idiom').textContent = '已完成 ✓';
        heldBadges++;
      } else {
        document.getElementById('card-idiom').classList.remove('completed');
        document.getElementById('status-idiom').textContent = '未完成';
      }

      document.getElementById('badge-count').textContent = `目前持有：${heldBadges} / ${requiredBadges}`;
    }

    function resetProgress() {
      if(confirm('確定要清除所有進度並重新開始嗎？')) {
        localStorage.removeItem('cert_dynasty');
        localStorage.removeItem('cert_idiom');
        localStorage.setItem('adventure_start', Date.now());
        window.location.reload();
      }
    }

    function openGate() {
      document.getElementById('gate-modal').classList.add('active');
      setupBackpack();
    }

    function closeGate() {
      document.getElementById('gate-modal').classList.remove('active');
      // Reset slots
      document.getElementById('slot-dynasty').innerHTML = '<div class="slot-label">情緒座標</div>';
      document.getElementById('slot-dynasty').classList.remove('filled');
      document.getElementById('slot-idiom').innerHTML = '<div class="slot-label">森之尋字</div>';
      document.getElementById('slot-idiom').classList.remove('filled');
      slotsFilled = 0;
    }

    // --- Drag and Drop Logic ---
    let draggedBadge = null;

    function setupBackpack() {
      const backpack = document.getElementById('backpack');
      const emptyMsg = document.getElementById('empty-msg');
      
      // Clear existing badges
      Array.from(backpack.children).forEach(c => {
        if(c.id !== 'empty-msg') c.remove();
      });

      let hasItems = false;

      if (localStorage.getItem('cert_dynasty')) {
        createBadge('cert_dynasty', backpack);
        hasItems = true;
      }
      if (localStorage.getItem('cert_idiom')) {
        createBadge('cert_idiom', backpack);
        hasItems = true;
      }

      emptyMsg.style.display = hasItems ? 'none' : 'block';
    }

    function createBadge(type, container) {
      const badge = document.createElement('div');
      badge.className = `badge ${type}`;
      badge.draggable = true;
      badge.dataset.type = type;

      // Mouse Events
      badge.addEventListener('dragstart', handleDragStart);
      badge.addEventListener('dragend', handleDragEnd);

      // Touch Events for Mobile
      badge.addEventListener('touchstart', handleTouchStart, {passive: false});
      badge.addEventListener('touchmove', handleTouchMove, {passive: false});
      badge.addEventListener('touchend', handleTouchEnd);

      container.appendChild(badge);
    }

    function handleDragStart(e) {
      draggedBadge = this;
      setTimeout(() => this.style.opacity = '0', 0);
    }

    function handleDragEnd() {
      this.style.opacity = '1';
      draggedBadge = null;
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
    }

    // Touch Support logic
    let touchGhost = null;
    let initialTouchX = 0, initialTouchY = 0;

    function handleTouchStart(e) {
      draggedBadge = this;
      initialTouchX = e.touches[0].clientX;
      initialTouchY = e.touches[0].clientY;
      
      // Create ghost for dragging
      touchGhost = this.cloneNode(true);
      touchGhost.style.position = 'fixed';
      touchGhost.style.zIndex = '9999';
      touchGhost.style.opacity = '0.8';
      touchGhost.style.pointerEvents = 'none';
      touchGhost.style.left = (initialTouchX - 40) + 'px';
      touchGhost.style.top = (initialTouchY - 40) + 'px';
      document.body.appendChild(touchGhost);
      this.style.opacity = '0.5';
      e.preventDefault();
    }

    function handleTouchMove(e) {
      if(!touchGhost) return;
      const x = e.touches[0].clientX;
      const y = e.touches[0].clientY;
      touchGhost.style.left = (x - 40) + 'px';
      touchGhost.style.top = (y - 40) + 'px';

      // Find slot under touch
      const elementBelow = document.elementFromPoint(x, y);
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
      if(elementBelow && elementBelow.closest('.slot')) {
        elementBelow.closest('.slot').classList.add('drag-over');
      }
      e.preventDefault();
    }

    function handleTouchEnd(e) {
      if(touchGhost) {
        touchGhost.remove();
        touchGhost = null;
      }
      this.style.opacity = '1';
      
      const touch = e.changedTouches[0];
      const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      const dropSlot = elementBelow ? elementBelow.closest('.slot') : null;

      document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));

      if(dropSlot) {
        processDrop(draggedBadge, dropSlot);
      }
      
      draggedBadge = null;
    }

    // Setup Drop Zones
    document.querySelectorAll('.slot').forEach(slot => {
      slot.addEventListener('dragover', function(e) {
        e.preventDefault();
        if(!this.classList.contains('filled')) this.classList.add('drag-over');
      });
      slot.addEventListener('dragleave', function() {
        this.classList.remove('drag-over');
      });
      slot.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        processDrop(draggedBadge, this);
      });
    });

    function processDrop(badge, slot) {
      if(!badge || slot.classList.contains('filled')) return;

      const acceptType = slot.dataset.accept;
      const badgeType = badge.dataset.type;

      if(acceptType === badgeType) {
        // Success
        slot.classList.add('filled');
        badge.draggable = false;
        // Remove touch listeners to prevent dragging out
        const clone = badge.cloneNode(true);
        slot.appendChild(clone);
        badge.remove();
        
        slotsFilled++;
        
        // Check if empty msg should show
        if(document.getElementById('backpack').children.length === 1) { // only empty-msg left
          document.getElementById('empty-msg').style.display = 'block';
        }

        if(slotsFilled >= requiredBadges) {
          setTimeout(showVictory, 500);
        }
      } else {
        // Error
        slot.classList.add('error');
        setTimeout(() => slot.classList.remove('error'), 400);
      }
    }

    function showVictory() {
      document.getElementById('gate-modal').classList.remove('active');
      document.getElementById('victory-screen').style.display = 'flex';
      
      const startTime = parseInt(localStorage.getItem('adventure_start') || Date.now());
      const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
      const mins = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
      const secs = String(elapsedSeconds % 60).padStart(2, '0');
      
      document.getElementById('time-display').textContent = `總冒險時長：${mins} 分 ${secs} 秒`;

      createFireworks();
    }

    function createFireworks() {
      const colors = ['#FFD54F', '#4CAF50', '#FF5252', '#03A9F4', '#E040FB'];
      for(let i=0; i<50; i++) {
        setTimeout(() => {
          const fw = document.createElement('div');
          fw.className = 'firework';
          fw.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          fw.style.left = 20 + Math.random() * 60 + 'vw';
          fw.style.top = 20 + Math.random() * 50 + 'vh';
          
          for(let p=0; p<12; p++) {
            const part = fw.cloneNode();
            const angle = p * (Math.PI * 2 / 12);
            const dist = 50 + Math.random() * 100;
            part.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            part.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            document.getElementById('victory-screen').appendChild(part);
            setTimeout(() => part.remove(), 1000);
          }
        }, i * 150);
      }
    }

    // Init
    updateUI();
  </script>
</body>
</html>
